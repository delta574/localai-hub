version: 2
project_name: LocalAI

before:
  hooks:
    - go mod tidy
    - cp -r web/build dist/web

builds:
  - env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - windows_amd64
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64

archives:
  - name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    files:
      - dist/web/**/*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
