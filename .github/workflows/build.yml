name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache-dependency-path: web/package-lock.json

      - name: Install & check SPA
        run: |
          cd web
          npm ci
          npx svelte-kit sync
          npm run svelte-check

      - name: Build SPA
        run: |
          cd web
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build binary
        run: go build -ldflags="-s -w" -o LocalAI.exe .

      - name: Upload exe
        uses: actions/upload-artifact@v6
        with:
          name: LocalAI-Windows-x64
          path: LocalAI.exe
