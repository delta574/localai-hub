name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build SPA
        run: |
          cd web
          npm ci
          npx svelte-kit sync
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.24'

      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-v4-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Verify modules
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Test (Backend)
        run: go test ./... -count=1

      - name: Test (Frontend)
        working-directory: web
        run: npx vitest run

      - name: npm audit
        working-directory: web
        run: npm audit --audit-level=high

      - name: govulncheck
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.3
          govulncheck -show verbose ./...

      - name: Build binary
        run: go build -ldflags="-s -w" -o LocalAI .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: LocalAI-${{ runner.os }}-x64
          path: LocalAI*
