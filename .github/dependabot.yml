version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      svelte:
        patterns:
          - "@sveltejs/*"
          - "svelte"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      typescript:
        patterns:
          - "typescript"
          - "typescript-eslint"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
